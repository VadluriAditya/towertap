<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0e1a">
<title>TowerTap</title>
<style>
  html, body { margin: 0; height: 100%; background: #0b0e1a; overscroll-behavior: none; }
  canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
  #hud { position: fixed; top: 0; left: 0; right: 0; text-align: center; color: white;
         font-family: -apple-system, system-ui, sans-serif; pointer-events: none; padding-top: env(safe-area-inset-top, 0px); }
  #score { font-size: 44px; font-weight: 700; margin-top: 50px; }
  #best { font-size: 13px; opacity: 0.6; letter-spacing: 1px; }
  #overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; }
  #overlay.show { display: flex; }
  #card { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border-radius: 20px;
          padding: 28px 36px; text-align: center; color: white; font-family: -apple-system, system-ui, sans-serif; }
  #card h2 { margin: 0 0 8px; }
  #card button { margin-top: 16px; padding: 12px 28px; border: none; border-radius: 12px;
                 background: #FF7A45; color: white; font-size: 17px; font-weight: 600; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"><div id="score">0</div><div id="best">BEST 0</div></div>
<div id="overlay"><div id="card"><h2>Game Over</h2><p id="finalScore">Score 0</p><button id="retry">Try Again</button><div style="margin-top:14px;font-size:12px;"><a href="https://vadluriaditya.github.io/onetap-games-hub/" style="color:#FF7A45;text-decoration:none;font-weight:600;">More free games →</a></div></div></div>
<script src="game.js"></script>
</body>
</html>
